<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>LLM logo icon</title>
  <desc>A dark rounded-square icon with a smooth rainbow-gradient LLM wordmark, inspired by Apple TV aesthetic</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#111113"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="18%"  stop-color="#818cf8"/>
      <stop offset="36%"  stop-color="#38bdf8"/>
      <stop offset="54%"  stop-color="#34d399"/>
      <stop offset="72%"  stop-color="#fbbf24"/>
      <stop offset="88%"  stop-color="#f87171"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.00"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="60" y="60" width="560" height="560" rx="130"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="60" y="60" width="560" height="560" rx="130" fill="url(#bgGlow)"/>

  <!-- Subtle inner top shine -->
  <rect x="60" y="60" width="560" height="280" rx="130" fill="url(#shineGrad)" clip-path="url(#iconClip)"/>

  <!-- Subtle radial highlight -->
  <ellipse cx="340" cy="260" rx="180" ry="90" fill="#ffffff" fill-opacity="0.025"/>

  <!-- LLM text -->
  <text
    x="340"
    y="420"
    text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="210"
    font-weight="700"
    letter-spacing="-8"
    fill="url(#textGrad)"
  >LLM</text>

  <!-- Very subtle bottom reflection fade -->
  <rect x="60" y="480" width="560" height="140" rx="0" fill="#000000" fill-opacity="0.18" clip-path="url(#iconClip)"/>

  <!-- Border gloss -->
  <rect x="60" y="60" width="560" height="560" rx="130" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.08"/>
</svg>