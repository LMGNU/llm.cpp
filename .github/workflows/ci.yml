name: CI

on:
  push:
    branches:
      - exp
      - master
  pull_request:

permissions:
  contents: read

jobs:
  cpp-build:
    name: C++ build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build Quadtrix
        run: g++ -std=c++17 -O2 -I. -Iinclude -o quadtrix main.cpp

  backend-smoke:
    name: Backend smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic pydantic-settings httpx redis

      - name: Compile Python sources
        run: python -m compileall backend engine iGPU

      - name: Import FastAPI application
        working-directory: backend
        run: |
          python -c "from main import app; print(app.title)"

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
