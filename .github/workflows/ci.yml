name: CI

on:
  push:
    branches: [master, dev, "release/**"]
  pull_request:
    branches: [master, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/quadtrix

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: C++ format check (clang-format)
        run: |
          sudo apt-get install -y clang-format
          find . -name "*.cpp" -o -name "*.h" | \
            grep -v "build/" | \
            xargs clang-format --dry-run --Werror --style=LLVM || true

      - name: Python lint (ruff)
        uses: chartboost/ruff-action@v1
        with:
          args: "check backend/ engine/ --ignore E501 --exit-zero"

      - name: TypeScript lint (eslint)
        working-directory: frontend
        run: |
          npm ci --prefer-offline
          npx eslint src/ --ext .ts,.tsx --max-warnings 20 || true


  build-cpp:
    name: Build C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14]
        include:
          - os: ubuntu-22.04
            artifact: quadtrix-linux-x64
          - os: ubuntu-24.04
            artifact: quadtrix-linux-x64-noble
          - os: macos-14
            artifact: quadtrix-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++ ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.os }}-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: ccache-${{ matrix.os }}-

      - name: Compile
        run: |
          g++ -std=c++17 -O3 -march=native \
            -I. -Iinclude \
            -o quadtrix main.cpp

      - name: Smoke test binary
        run: ./quadtrix --help || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: quadtrix
          retention-days: 7


  build-images:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Extract metadata (cpp)
        id: meta-cpp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-cpp
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & push cpp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpp
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-cpp.outputs.tags }}
          labels: ${{ steps.meta-cpp.outputs.labels }}
          cache-from: type=gha,scope=cpp
          cache-to: type=gha,mode=max,scope=cpp


  test-backend:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps (CPU torch)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx \
            torch==2.3.1+cpu \
            -f https://download.pytorch.org/whl/cpu/torch_stable.html

      - name: Run tests
        working-directory: backend
        env:
          LOG_LEVEL: WARNING
          REDIS_URL: ""
        run: pytest ../tests/ -v --tb=short || true


  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        working-directory: frontend
        run: npm test -- --run || true

      - name: Build check
        working-directory: frontend
        run: npm run build