name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build C++ binary
        run: g++ -std=c++17 -O2 -I. -Iinclude -o quadtrix main.cpp

      - name: Compile Python sources
        run: python -m compileall backend engine iGPU

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package release files
        run: |
          tar \
            --exclude='*.pt' \
            --exclude='engine/logs' \
            --exclude='__pycache__' \
            -czf quadtrix-linux.tar.gz \
            quadtrix README.md LICENSE run.md backend engine iGPU include src data config frontend/dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: quadtrix-linux.tar.gz
          generate_release_notes: true
