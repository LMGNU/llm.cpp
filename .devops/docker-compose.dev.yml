services:
  frontend:
    build:
      context: .
      dockerfile: .devops/Dockerfile.dev.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: "http://localhost:3001"
    command: [ "npm", "run", "dev", "--", "--host", "0.0.0.0" ]
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5173/" ]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    volumes:
      - ./backend:/app/backend:delegated
      - ./engine:/app/engine:delegated
      - models:/models
    environment:
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3001"
    command:
      - python
      - -m
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "3001"
      - --reload
      - --reload-dir
      - /app/backend

  redis:
    ports:
      - "6379:6379"
volumes:
  models:
